name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Playwright browsers
      working-directory: frontend
      run: npx playwright install --with-deps

    - name: Build frontend application
      working-directory: frontend
      run: npm run build
      env:
        CI: false

    - name: Start test server in background
      working-directory: frontend
      run: |
        node tests/e2e/test-server.js > /tmp/test-server.log 2>&1 &
        echo "Test server PID: $!"
        sleep 10
        # Verify server is running
        curl -s http://localhost:3000/api/ranges || exit 1
        echo "Test server is running on port 3000"
      env:
        PORT: 3000

    - name: Run CI smoke tests
      working-directory: frontend
      run: npx playwright test tests/e2e/specs/ci-smoke.spec.ts
      env:
        BASE_URL: http://localhost:3000
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: frontend/test-results/
        retention-days: 30

    - name: Upload server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: server-logs
        path: /tmp/test-server.log
        retention-days: 30
